<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Играйка</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #6750A4; --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-surface: #FFFBFE; --md-sys-color-on-surface: #1C1B1F;
            --md-sys-color-secondary-container: #E8DEF8; --md-sys-color-on-secondary-container: #1D192B;
            --md-sys-color-surface-variant: #E7E0EC; --md-sys-color-on-surface-variant: #49454F;
            --transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        [data-theme="dark"] {
            --md-sys-color-primary: #D0BCFF; --md-sys-color-on-primary: #381E72;
            --md-sys-color-surface: #1C1B1F; --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-secondary-container: #4A4458; --md-sys-color-on-secondary-container: #E8DEF8;
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); 
            display: flex; flex-direction: column; min-height: 100vh; transition: var(--transition);
        }

        .top-app-bar {
            height: 64px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; border-bottom: 1px solid var(--md-sys-color-surface-variant);
        }
        .logo { height: 32px; cursor: pointer; }

        .login-container {
            max-width: 400px; width: 85%; margin: auto; padding: 40px 24px;
            background: var(--md-sys-color-surface-variant);
            border-radius: 28px; text-align: center;
        }

        .login-options { display: flex; flex-direction: column; gap: 16px; margin-top: 32px; align-items: center; }

        /* Каноничная кнопка Material 3 (Tonal) */
        .auth-btn-tonal {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 16px; border-radius: 100px; border: none;
            background: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .auth-btn-tonal:hover { opacity: 0.85; transform: translateY(-1px); }
        .auth-btn-tonal img { width: 22px; height: 22px; }

        /* Контейнер для виджета Telegram, чтобы он был по центру */
        #tg-wrapper { width: 100%; display: flex; justify-content: center; margin-top: 8px; }

        footer { padding: 24px; text-align: center; font-size: 13px; opacity: 0.7; }
    </style>
</head>
<body>
    <header class="top-app-bar">
        <img src="logo.png" class="logo" onclick="location.href='index.html'">
        <div style="display: flex; gap: 8px;">
            <a href="index.html" style="color: inherit; text-decoration: none;" class="material-symbols-outlined">home</a>
        </div>
    </header>

    <main style="flex:1; display:flex;">
        <div class="login-container">
            <span class="material-symbols-outlined" style="font-size: 48px; color: var(--md-sys-color-primary);">account_circle</span>
            <h2 style="margin: 16px 0 8px; font-weight: 500;">Вход в аккаунт</h2>
            <p style="font-size: 14px; opacity: 0.8;">Выберите удобный сервис для авторизации</p>

            <div class="login-options">
                <button class="auth-btn-tonal">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="G">
                    Войти через Google
                </button>

                <button class="auth-btn-tonal">
                    <img src="https://yastatic.net/s3/home/icons/yandex_id/v2/yandex_id_light.svg" alt="Y">
                    Войти через Яндекс
                </button>

                <div id="tg-wrapper">
                    <script async src="https://telegram.org/js/telegram-widget.js?23" 
                        data-telegram-login="igrai_ka_bot" 
                        data-size="large" 
                        data-onauth="onTelegramAuth(user)" 
                        data-request-access="write">
                    </script>
                </div>
            </div>
        </div>
    </main>

    <footer>
        ИНН: 312326993017 | Играйка 2026
    </footer>

    <script type="text/javascript">
      function onTelegramAuth(user) {
        // Сохраняем данные для отображения аватарки
        const userData = {
            name: user.first_name,
            photo: user.photo_url,
            username: user.username
        };
        localStorage.setItem('userData', JSON.stringify(userData));
        
        alert('Привет, ' + user.first_name + '! Вход выполнен успешно.');
        window.location.href = 'index.html'; // Уходим на главную
      }

      // Функция переключения темы (чтобы не ломалась)
      function applyTheme() {
          const theme = localStorage.getItem('theme') || 'light';
          document.documentElement.setAttribute('data-theme', theme);
      }
      applyTheme();
    </script>
</body>
</html>
