<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Играйка — Магазин</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        :root { 
            --md-sys-color-primary: #6750A4; 
            --md-sys-color-on-primary: #FFFFFF; 
            --md-sys-color-surface: #FFFBFE; 
            --md-sys-color-on-surface: #1C1B1F; 
            --md-sys-color-surface-variant: #E7E0EC; 
            --md-sys-color-on-surface-variant: #49454F; 
            --transition: all 0.3s cubic-bezier(0.2, 0, 0, 1); 
        }
        [data-theme="dark"] { 
            --md-sys-color-primary: #D0BCFF; 
            --md-sys-color-on-primary: #381E72; 
            --md-sys-color-surface: #1C1B1F; 
            --md-sys-color-on-surface: #E6E1E5; 
            --md-sys-color-surface-variant: #49454F; 
            --md-sys-color-on-surface-variant: #CAC4D0; 
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); line-height: 1.5; }
        
        .top-app-bar { 
            height: 64px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 16px; border-bottom: 1px solid var(--md-sys-color-surface-variant); 
            position: sticky; top: 0; z-index: 1000; background: var(--md-sys-color-surface);
            backdrop-filter: blur(12px); 
        }
        .logo { height: 32px; cursor: pointer; }
        
        .actions { display: flex; gap: 8px; align-items: center; }
        .m3-icon-btn { 
            width: 48px; height: 48px; border: none; background: none; border-radius: 24px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; color: var(--md-sys-color-on-surface-variant); text-decoration: none; 
        }
        
        .container { max-width: 1200px; margin: 32px auto; padding: 0 20px; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 24px; 
        }

        /* Стили карточки */
        .m3-card { 
            background: var(--md-sys-color-surface); 
            border: 1px solid var(--md-sys-color-surface-variant); 
            border-radius: 28px; padding: 16px; 
            display: flex; flex-direction: column; gap: 12px; 
            transition: var(--transition);
        }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 20px; background: #eee; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        
        .m3-btn-filled { 
            background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); 
            border: none; padding: 10px 20px; border-radius: 100px; font-weight: 600; cursor: pointer; 
        }
        .m3-btn-filled.in-cart { background: var(--md-sys-color-surface-variant); color: var(--md-sys-color-on-surface-variant); cursor: default; }
        
        .delete-btn { 
            color: #B3261E; border: 1px solid #B3261E; border-radius: 12px; 
            width: 40px; height: 40px; display: none; align-items: center; justify-content: center; 
            cursor: pointer; background: transparent; 
        }
    </style>
</head>
<body>
    <header class="top-app-bar">
        <img src="logo.png" class="logo" onclick="location.href='index.html'">
        <div class="actions">
            <a href="index.html" class="m3-icon-btn"><span class="material-symbols-outlined">home</span></a>
            <a href="cart.html" class="m3-icon-btn"><span class="material-symbols-outlined">shopping_cart</span></a>
            <button class="m3-icon-btn" onclick="toggleTheme()"><span class="material-symbols-outlined" id="theme-icon">dark_mode</span></button>
        </div>
    </header>

    <main class="container">
        <h1 style="font-weight: 500; margin-bottom: 24px;">Каталог пособий</h1>
        <div class="product-grid" id="main-grid">
            </div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem('cartData')) || [];
        
        function applyTheme() {
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            const icon = document.getElementById('theme-icon');
            if(icon) icon.innerText = t === 'dark' ? 'light_mode' : 'dark_mode';
        }

        function toggleTheme() {
            const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', n); 
            applyTheme();
        }

        function refreshButtons() {
            document.querySelectorAll('.m3-card').forEach(card => {
                const id = card.id.replace('product-', '');
                const inCart = cart.find(i => i.id == id);
                const btn = document.getElementById('buy-btn-' + id);
                const del = document.getElementById('del-btn-' + id);
                if (inCart && btn && del) {
                    btn.innerText = 'В корзине'; btn.classList.add('in-cart'); del.style.display = 'flex';
                } else if (btn && del) {
                    btn.innerText = 'Купить'; btn.classList.remove('in-cart'); del.style.display = 'none';
                }
            });
        }

        function handleCartAction(id, name, price, img) {
            if (cart.find(i => i.id == id)) return;
            cart.push({ id, name, price, img });
            localStorage.setItem('cartData', JSON.stringify(cart)); 
            refreshButtons();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id != id);
            localStorage.setItem('cartData', JSON.stringify(cart)); 
            refreshButtons();
        }

        applyTheme(); 
        window.onload = refreshButtons;
    </script>
</body>
</html>
