<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Играйка — Магазин</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            --transition: all 0.2s ease;
        }

        [data-theme="dark"] {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-surface: #141218;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); }

        /* --- ПРАВИЛЬНЫЙ HEADER --- */
        .top-app-bar {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: var(--md-sys-color-surface);
            border-bottom: 1px solid var(--md-sys-color-surface-variant);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { height: 32px; cursor: pointer; margin-right: 8px; }

        /* Группа кнопок слева (Лого + Домик) */
        .left-group { display: flex; align-items: center; gap: 4px; }

        /* Распорка, которая толкает остальные кнопки вправо */
        .spacer { flex-grow: 1; }

        /* Группа кнопок справа (Корзина + Тема + Вход) */
        .right-group { display: flex; align-items: center; gap: 8px; }

        .m3-icon-btn {
            width: 48px; height: 48px; border: none; background: none;
            border-radius: 24px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--md-sys-color-on-surface-variant);
            transition: var(--transition); text-decoration: none;
        }
        .m3-icon-btn:hover { background: var(--md-sys-color-surface-variant); }

        .m3-btn-filled {
            background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary);
            border: none; padding: 10px 24px; border-radius: 100px;
            font-weight: 500; cursor: pointer; transition: var(--transition);
        }

        .badge-container { position: relative; }
        .badge {
            position: absolute; top: 4px; right: 4px;
            background: #B3261E; color: white; font-size: 10px;
            min-width: 16px; height: 16px; border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
        }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .m3-card { background: var(--md-sys-color-surface-variant); border-radius: 28px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; background: #fff; }
    </style>
</head>
<body>

    <header class="top-app-bar">
        <div class="left-group">
            <img src="logo.png" class="logo" onclick="location.href='index.html'">
            <a href="index.html" class="m3-icon-btn"><span class="material-symbols-outlined">home</span></a>
        </div>

        <div class="spacer"></div>

        <div class="right-group">
            <div class="badge-container">
                <a href="cart.html" class="m3-icon-btn"><span class="material-symbols-outlined">shopping_cart</span></a>
                <div id="cart-badge" class="badge">0</div>
            </div>
            <button class="m3-icon-btn" onclick="toggleTheme()"><span class="material-symbols-outlined" id="theme-icon">dark_mode</span></button>
            <button class="m3-btn-filled">Войти</button>
        </div>
    </header>

    <main class="container">
        <h1>Каталог</h1>
        <div class="product-grid">
            <div class="m3-card">
                <img src="1.png" class="product-img">
                <h3 style="margin:0">Пособие 1</h3>
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight:700; color:var(--md-sys-color-primary);">890 ₽</span>
                    <button class="m3-btn-filled" onclick="addToCart(1, 'Пособие 1', 890, '1.png')">Купить</button>
                </div>
            </div>
            </div>
    </main>

    <script>
        function applyTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-icon').innerText = theme === 'dark' ? 'light_mode' : 'dark_mode';
        }
        function toggleTheme() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme();
        }
        let cart = JSON.parse(localStorage.getItem('cartData')) || [];
        function addToCart(id, name, price, img) {
            if (!cart.find(i => i.id === id)) {
                cart.push({ id, name, price, img });
                localStorage.setItem('cartData', JSON.stringify(cart));
                updateBadge();
            }
        }
        function updateBadge() { document.getElementById('cart-badge').innerText = cart.length; }
        applyTheme(); updateBadge();
    </script>
</body>
</html>
