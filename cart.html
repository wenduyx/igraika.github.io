<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Играйка</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        /* [Стили копируются для единства] */
        :root { --md-sys-color-primary: #6750A4; --md-sys-color-on-primary: #FFFFFF; --md-sys-color-primary-container: #EADDFF; --md-sys-color-on-primary-container: #21005D; --md-sys-color-surface: #FFFBFE; --md-sys-color-on-surface: #1C1B1F; --md-sys-color-surface-variant: #E7E0EC; --md-sys-color-on-surface-variant: #49454F; --transition: all 0.3s ease; }
        [data-theme="dark"] { --md-sys-color-primary: #D0BCFF; --md-sys-color-on-primary: #381E72; --md-sys-color-primary-container: #4F378B; --md-sys-color-on-primary-container: #EADDFF; --md-sys-color-surface: #1C1B1F; --md-sys-color-on-surface: #E6E1E5; --md-sys-color-surface-variant: #49454F; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); }
        .top-app-bar { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--md-sys-color-surface-variant); position: sticky; top: 0; }
        .logo { height: 32px; cursor: pointer; }
        .actions-group { display: flex; align-items: center; gap: 8px; }
        .m3-icon-btn { width: 48px; height: 48px; border: none; background: none; border-radius: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--md-sys-color-on-surface-variant); text-decoration: none; }
        .m3-icon-btn.active { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
        .m3-btn-filled { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border: none; padding: 12px 24px; border-radius: 100px; font-weight: 600; cursor: pointer; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .cart-item { display: flex; align-items: center; gap: 16px; background: var(--md-sys-color-surface-variant); padding: 16px; border-radius: 24px; margin-bottom: 12px; }
        .cart-img { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; background: #fff; }

        /* КАРТОЧКА ИТОГО — БОЛЬШАЯ И АККУРАТНАЯ */
        .summary-card {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            padding: 32px; border-radius: 28px; margin-top: 32px;
            display: flex; flex-direction: column; gap: 24px;
        }
        .summary-info { display: flex; justify-content: space-between; align-items: center; }
        .total-price { font-size: 2rem; font-weight: 700; }
        .checkout-btn { width: 100%; padding: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header class="top-app-bar">
        <img src="logo.png" class="logo" onclick="location.href='index.html'">
        <div class="actions-group">
            <a href="index.html" class="m3-icon-btn"><span class="material-symbols-outlined">home</span></a>
            <a href="cart.html" class="m3-icon-btn active"><span class="material-symbols-outlined">shopping_cart</span></a>
            <button class="m3-icon-btn" onclick="toggleTheme()"><span class="material-symbols-outlined" id="theme-icon">dark_mode</span></button>
            <button class="m3-btn-filled">Войти</button>
        </div>
    </header>

    <main class="container">
        <h1>Ваша корзина</h1>
        <div id="cart-list"></div>
        
        <div id="summary-section" style="display: none;">
            <div class="summary-card">
                <div class="summary-info">
                    <span style="font-size: 1.2rem; opacity: 0.9;">Итого к оплате:</span>
                    <span class="total-price"><span id="total-price">0</span> ₽</span>
                </div>
                <button class="m3-btn-filled checkout-btn">Оформить заказ</button>
            </div>
        </div>
    </main>

    <script>
        function applyTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-icon').innerText = theme === 'dark' ? 'light_mode' : 'dark_mode';
        }
        function toggleTheme() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme();
        }
        let cart = JSON.parse(localStorage.getItem('cartData')) || [];
        function render() {
            const list = document.getElementById('cart-list');
            const summary = document.getElementById('summary-section');
            if (cart.length === 0) {
                list.innerHTML = `<p style="text-align:center; padding: 40px; opacity: 0.6;">Корзина пуста</p>`;
                summary.style.display = 'none';
                return;
            }
            summary.style.display = 'block';
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-img">
                        <div style="flex-grow:1">
                            <h3 style="margin:0">${item.name}</h3>
                            <div style="font-weight:700; color:var(--md-sys-color-primary);">${item.price} ₽</div>
                        </div>
                        <button class="m3-icon-btn" style="color:#B3261E;" onclick="removeItem(${index})"><span class="material-symbols-outlined">delete</span></button>
                    </div>`;
            });
            document.getElementById('total-price').innerText = total.toLocaleString();
        }
        function removeItem(index) { cart.splice(index, 1); localStorage.setItem('cartData', JSON.stringify(cart)); render(); }
        applyTheme(); render();
    </script>
</body>
</html>
