<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Играйка</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #6750A4; --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-surface: #FFFBFE; --md-sys-color-on-surface: #1C1B1F;
            --md-sys-color-surface-variant: #E7E0EC; --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-outline: #79747E; --transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        [data-theme="dark"] {
            --md-sys-color-primary: #D0BCFF; --md-sys-color-on-primary: #381E72;
            --md-sys-color-surface: #1C1B1F; --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F; --md-sys-color-on-surface-variant: #CAC4D0;
        }

        html, body { height: 100%; margin: 0; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--md-sys-color-surface); 
            color: var(--md-sys-color-on-surface); transition: var(--transition);
            display: flex; flex-direction: column;
        }

        .top-app-bar {
            height: 64px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; border-bottom: 1px solid var(--md-sys-color-surface-variant);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(12px);
        }
        .logo { height: 32px; cursor: pointer; }
        .actions-group { display: flex; align-items: center; gap: 8px; }
        
        .m3-icon-btn {
            width: 48px; height: 48px; border: none; background: none; border-radius: 24px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--md-sys-color-on-surface-variant); text-decoration: none;
        }
        .m3-btn-filled {
            background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary);
            border: none; padding: 12px 24px; border-radius: 100px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block;
        }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; flex: 1; width: 100%; box-sizing: border-box; }
        
        .cart-item {
            display: flex; align-items: center; gap: 16px; padding: 16px;
            background: var(--md-sys-color-surface-variant); border-radius: 20px; margin-bottom: 12px;
        }
        .cart-img { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; }
        .cart-info { flex: 1; }
        .cart-price { font-weight: 700; }
        
        .empty-state { text-align: center; margin-top: 60px; opacity: 0.6; }
        
        .total-section {
            margin-top: 32px; padding: 24px; border-top: 1px solid var(--md-sys-color-outline);
            display: flex; justify-content: space-between; align-items: center;
        }

        footer { padding: 24px; text-align: center; font-size: 14px; opacity: 0.8; margin-top: 40px; border-top: 1px solid var(--md-sys-color-surface-variant); }
        
        #user-avatar { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: none; object-fit: cover; }
    </style>
</head>
<body>
    <header class="top-app-bar">
        <img src="logo.png" class="logo" onclick="location.href='index.html'">
        <div class="actions-group">
            <a href="index.html" class="m3-icon-btn"><span class="material-symbols-outlined">home</span></a>
            <a href="cart.html" class="m3-icon-btn" style="color: var(--md-sys-color-primary)"><span class="material-symbols-outlined">shopping_cart</span></a>
            <button class="m3-icon-btn" onclick="toggleTheme()"><span class="material-symbols-outlined" id="theme-icon">dark_mode</span></button>
            <button class="m3-btn-filled" id="login-btn" onclick="location.href='entry.html'">Войти</button>
            <img id="user-avatar" onclick="location.href='entry.html'" alt="Профиль">
        </div>
    </header>

    <main class="container">
        <h1 style="font-weight: 500; margin-bottom: 32px;">Ваша корзина</h1>
        <div id="cart-list">
            </div>

        <div id="cart-footer-actions" style="display: none;">
            <div class="total-section">
                <div>
                    <div style="opacity: 0.7;">Итого к оплате:</div>
                    <div id="total-price" style="font-size: 24px; font-weight: 700;">0 ₽</div>
                </div>
                <button class="m3-btn-filled" style="padding: 16px 32px;">Оформить заказ</button>
            </div>
        </div>
    </main>

    <footer>
        ИНН: 312326993017 | Играйка 2026
    </footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('cartData')) || [];

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('userData'));
            if (user && user.photo) {
                document.getElementById('login-btn').style.display = 'none';
                const avatar = document.getElementById('user-avatar');
                avatar.src = user.photo;
                avatar.style.display = 'block';
            }
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const footerActions = document.getElementById('cart-footer-actions');
            
            if (cart.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined" style="font-size: 64px;">shopping_basket</span>
                        <p>В корзине пока пусто</p>
                        <a href="index.html" class="m3-btn-filled" style="margin-top: 16px;">Перейти к покупкам</a>
                    </div>`;
                footerActions.style.display = 'none';
                return;
            }

            footerActions.style.display = 'block';
            list.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.img}" class="cart-img">
                    <div class="cart-info">
                        <div style="font-weight: 600;">${item.name}</div>
                        <div class="cart-price">${item.price} ₽</div>
                    </div>
                    <button class="m3-icon-btn" onclick="removeItem(${item.id})" style="color: #B3261E">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = total + ' ₽';
        }

        function removeItem(id) {
            cart = cart.filter(item => item.id != id);
            localStorage.setItem('cartData', JSON.stringify(cart));
            renderCart();
        }

        function applyTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.innerText = theme === 'dark' ? 'light_mode' : 'dark_mode';
        }

        function toggleTheme() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme();
        }

        window.onload = () => {
            applyTheme();
            renderCart();
            checkAuth();
        };
    </script>
</body>
</html>
