<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Играйка</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <style>
        :root {
            /* Базовые цвета Material 3 */
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-error: #B3261E;
            --transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
        }

        [data-theme="dark"] {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-surface: #141218;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-on-surface-variant: #CAC4D0;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            transition: var(--transition);
            -webkit-font-smoothing: antialiased;
        }

        /* --- Единая Шапка (Header) --- */
        .top-app-bar {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background-color: var(--md-sys-color-surface);
            border-bottom: 1px solid var(--md-sys-color-surface-variant);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { height: 32px; margin-right: 24px; cursor: pointer; }

        .nav-actions { flex-grow: 1; display: flex; gap: 4px; }

        /* Иконочные кнопки M3 */
        .m3-icon-btn {
            width: 48px;
            height: 48px;
            border: none;
            background: none;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--md-sys-color-on-surface-variant);
            transition: var(--transition);
            text-decoration: none;
        }

        .m3-icon-btn:hover { background-color: var(--md-sys-color-surface-variant); }
        .m3-icon-btn:active { background-color: var(--md-sys-color-primary-container); }

        /* Обычные кнопки M3 */
        .m3-btn-filled {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        /* Бейдж корзины */
        .badge-container { position: relative; }
        .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background-color: var(--md-sys-color-error);
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* --- Контент корзины --- */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 { font-weight: 400; font-size: 2rem; margin-bottom: 24px; }

        /* Список товаров */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background-color: var(--md-sys-color-surface-variant);
            padding: 12px 16px;
            border-radius: 24px;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .cart-img {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            object-fit: cover;
            background-color: white;
        }

        .cart-info { flex-grow: 1; }
        .cart-info h3 { margin: 0; font-size: 1.1rem; font-weight: 600; }
        .cart-info p { margin: 4px 0 0; color: var(--md-sys-color-primary); font-weight: 700; }

        .remove-btn { color: var(--md-sys-color-error); }

        /* Итоговая карточка */
        .summary-card {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            padding: 24px;
            border-radius: 28px;
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .summary-row { display: flex; justify-content: space-between; align-items: center; }
        .summary-row .total-text { font-size: 1.5rem; font-weight: 700; }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 80px 0;
            color: var(--md-sys-color-on-surface-variant);
        }
        .empty-state .material-symbols-outlined { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
    </style>
</head>
<body>

    <header class="top-app-bar">
        <img src="logo.png" alt="Играйка" class="logo" onclick="location.href='index.html'">
        
        <nav class="nav-actions">
            <a href="index.html" class="m3-icon-btn" title="Главная">
                <span class="material-symbols-outlined">home</span>
            </a>
        </nav>

        <div style="display: flex; gap: 8px; align-items: center;">
            <button class="m3-icon-btn" onclick="toggleTheme()" id="theme-toggle">
                <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
            </button>
            
            <div class="badge-container">
                <a href="cart.html" class="m3-icon-btn" style="background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);">
                    <span class="material-symbols-outlined">shopping_cart</span>
                </a>
                <div id="cart-badge" class="badge">0</div>
            </div>

            <button class="m3-btn-filled" onclick="alert('Вход будет скоро!')">Войти</button>
        </div>
    </header>

    <main class="container">
        <h1>Ваша корзина</h1>
        
        <div id="cart-content">
            </div>

        <div id="summary-section" style="display: none;">
            <div class="summary-card">
                <div class="summary-row">
                    <span>Итого к оплате:</span>
                    <span class="total-text"><span id="total-price">0</span> ₽</span>
                </div>
                <button class="m3-btn-filled" style="width: 100%; padding: 16px;">
                    Оформить заказ
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- ТЕМА ---
        function applyTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-icon').innerText = theme === 'dark' ? 'light_mode' : 'dark_mode';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme();
        }

        // --- КОРЗИНА ---
        let cart = JSON.parse(localStorage.getItem('cartData')) || [];

        function renderCart() {
            const container = document.getElementById('cart-content');
            const summary = document.getElementById('summary-section');
            const badge = document.getElementById('cart-badge');
            
            badge.innerText = cart.length;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined">shopping_basket</span>
                        <p>В корзине пока ничего нет</p>
                        <button class="m3-btn-filled" onclick="location.href='index.html'" style="margin-top:16px;">
                            Перейти к покупкам
                        </button>
                    </div>`;
                summary.style.display = 'none';
                return;
            }

            summary.style.display = 'block';
            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-img" onerror="this.src='https://placehold.co/100x100?text=Logo'">
                        <div class="cart-info">
                            <h3>${item.name}</h3>
                            <p>${item.price} ₽</p>
                        </div>
                        <button class="m3-icon-btn remove-btn" onclick="removeItem(${index})">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>`;
            });

            document.getElementById('total-price').innerText = total.toLocaleString();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cartData', JSON.stringify(cart));
            renderCart();
        }

        // Инициализация
        applyTheme();
        renderCart();
    </script>
</body>
</html>
