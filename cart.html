<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Детская Лавка</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        /* (Копируем те же стили :root и body из index.html для консистентности) */
        :root {
            --md-sys-color-primary: #6750A4; --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-surface: #FEF7FF; --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-surface-variant: #E7E0EC;
        }
        [data-theme="dark"] {
            --md-sys-color-primary: #D0BCFF; --md-sys-color-on-primary: #381E72;
            --md-sys-color-surface: #141218; --md-sys-color-on-surface: #E6E1E5;
        }
        body { margin: 0; font-family: 'Open Sans', sans-serif; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); }
        .top-app-bar { height: 64px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--md-sys-color-surface-variant); }
        .container { max-width: 800px; margin: 32px auto; padding: 0 16px; }
        
        .cart-item {
            display: flex; align-items: center; gap: 16px;
            background: var(--md-sys-color-surface-variant);
            padding: 16px; border-radius: 20px; margin-bottom: 12px;
        }
        .cart-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .cart-info { flex-grow: 1; }
        .m3-btn { border: none; background: #B3261E; color: white; padding: 8px 16px; border-radius: 100px; cursor: pointer; }
        .total-section { margin-top: 32px; text-align: right; font-size: 1.5rem; }
    </style>
</head>
<body>

    <header class="top-app-bar">
        <button class="m3-btn" style="background:none; color:inherit;" onclick="location.href='index.html'">
            <span class="material-symbols-outlined">arrow_back</span> Назад
        </button>
        <h2 style="margin-left: 16px;">Ваша корзина</h2>
    </header>

    <main class="container">
        <div id="cart-list">
            </div>
        <div class="total-section">
            Итого: <span id="total-price">0</span> ₽
        </div>
    </main>

    <script>
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);

        let cart = JSON.parse(localStorage.getItem('cartData')) || [];
        const listContainer = document.getElementById('cart-list');
        const priceElement = document.getElementById('total-price');

        function renderCart() {
            if (cart.length === 0) {
                listContainer.innerHTML = "<h3>В корзине пока пусто :(</h3>";
                priceElement.innerText = 0;
                return;
            }

            listContainer.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                listContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-img">
                        <div class="cart-info">
                            <h4 style="margin:0">${item.name}</h4>
                            <span>${item.price} ₽</span>
                        </div>
                        <button class="m3-btn" onclick="removeItem(${index})">Удалить</button>
                    </div>
                `;
            });
            priceElement.innerText = total;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cartData', JSON.stringify(cart));
            renderCart();
        }

        renderCart();
    </script>
</body>
</html>
