<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Играйка</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-surface: #FFFBFE;
            --md-sys-color-on-surface: #1C1B1F;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-outline: #79747E;
            --transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        [data-theme="dark"] {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-surface: #1C1B1F;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-on-surface-variant: #CAC4D0;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--md-sys-color-surface); 
            color: var(--md-sys-color-on-surface); 
            transition: var(--transition);
        }

        /* --- ПРОЗРАЧНЫЙ HEADER (Как на главной) --- */
        .top-app-bar {
            height: 64px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; 
            background: transparent; 
            border-bottom: 1px solid var(--md-sys-color-surface-variant);
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .logo { height: 32px; cursor: pointer; }
        .actions-group { display: flex; align-items: center; gap: 8px; }

        .m3-icon-btn {
            width: 48px; height: 48px; border: none; background: none; border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--md-sys-color-on-surface-variant);
            transition: var(--transition); text-decoration: none;
        }
        .m3-icon-btn:hover { background: var(--md-sys-color-surface-variant); }
        .m3-icon-btn.active { 
            background: var(--md-sys-color-primary-container); 
            color: var(--md-sys-color-on-primary-container); 
        }

        .m3-btn-filled {
            background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary);
            border: none; padding: 12px 24px; border-radius: 100px;
            font-weight: 600; cursor: pointer; transition: var(--transition);
        }

        /* --- КОНТЕНТ КОРЗИНЫ --- */
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        
        .cart-list { display: flex; flex-direction: column; gap: 16px; }

        .cart-item { 
            display: flex; align-items: center; gap: 16px; 
            background: var(--md-sys-color-surface-variant); 
            padding: 12px; border-radius: 24px; 
            transition: var(--transition);
        }

        /* Квадратное превью товара */
        .cart-img { 
            width: 72px; height: 72px; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            border-radius: 16px; 
            background: #fff; 
        }

        .cart-info { flex-grow: 1; }
        .cart-info h3 { margin: 0; font-size: 1rem; font-weight: 500; }
        .cart-price { font-weight: 700; color: var(--md-sys-color-primary); }

        /* КАРТОЧКА ИТОГО */
        .summary-card {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            padding: 24px; border-radius: 28px; margin-top: 32px;
            display: flex; flex-direction: column; gap: 20px;
        }
        
        .summary-row { display: flex; justify-content: space-between; align-items: center; }
        
        .email-input {
            width: 100%; box-sizing: border-box; padding: 16px; 
            border-radius: 16px; border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface); 
            color: var(--md-sys-color-on-surface);
            font-size: 1rem; outline: none; transition: var(--transition);
        }
        .email-input:focus { border-color: var(--md-sys-color-primary); border-width: 2px; }

        .checkout-btn { width: 100%; padding: 18px; font-size: 1.1rem; }

        .empty-state { text-align: center; padding: 60px 20px; opacity: 0.6; }
    </style>
</head>
<body>

    <header class="top-app-bar">
        <img src="logo.png" class="logo" onclick="location.href='index.html'">
        <div class="actions-group">
            <a href="index.html" class="m3-icon-btn"><span class="material-symbols-outlined">home</span></a>
            <a href="cart.html" class="m3-icon-btn active"><span class="material-symbols-outlined">shopping_cart</span></a>
            <button class="m3-icon-btn" onclick="toggleTheme()"><span class="material-symbols-outlined" id="theme-icon">dark_mode</span></button>
            <button class="m3-btn-filled">Войти</button>
        </div>
    </header>

    <main class="container">
        <h1 style="font-weight: 500; margin-bottom: 24px;">Ваш заказ</h1>
        
        <div id="cart-list" class="cart-list">
            </div>

        <div id="summary-section" style="display: none;">
            <div class="summary-card">
                <div class="summary-row">
                    <span style="font-size: 1.1rem;">Сумма заказа:</span>
                    <span style="font-size: 1.8rem; font-weight: 700;"><span id="total-price">0</span> ₽</span>
                </div>

                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-size: 0.85rem; padding-left: 4px; opacity: 0.8;">Email для получения пособия:</label>
                    <input type="email" id="user-email" class="email-input" placeholder="example@mail.ru">
                </div>

                <button class="m3-btn-filled checkout-btn" onclick="processOrder()">Оплатить заказ</button>
            </div>
        </div>
    </main>

    <script>
        // ТЕМА
        function applyTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-icon').innerText = theme === 'dark' ? 'light_mode' : 'dark_mode';
        }
        
        function toggleTheme() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme();
        }

        // КОРЗИНА
        let cart = JSON.parse(localStorage.getItem('cartData')) || [];

        function render() {
            const listContainer = document.getElementById('cart-list');
            const summary = document.getElementById('summary-section');
            
            if (cart.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined" style="font-size: 48px;">shopping_basket</span>
                        <p>В корзине пока ничего нет</p>
                        <button class="m3-btn-filled" onclick="location.href='index.html'" style="margin-top:16px;">Вернуться в магазин</button>
                    </div>`;
                summary.style.display = 'none';
                return;
            }

            summary.style.display = 'block';
            listContainer.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                listContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-img">
                        <div class="cart-info">
                            <h3>${item.name}</h3>
                            <div class="cart-price">${item.price} ₽</div>
                        </div>
                        <button class="m3-icon-btn" style="color:#B3261E;" onclick="removeItem(${index})">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>`;
            });

            document.getElementById('total-price').innerText = total.toLocaleString();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cartData', JSON.stringify(cart));
            render();
        }

        function processOrder() {
            const email = document.getElementById('user-email').value;
            if (!email || !email.includes('@')) {
                document.getElementById('user-email').style.borderColor = "#B3261E";
                document.getElementById('user-email').focus();
                return;
            }
            
            // Здесь будет логика оплаты (ЮKassa / Бот)
            console.log("Оформляем заказ на:", email);
        }

        applyTheme();
        render();
    </script>
</body>
</html>
